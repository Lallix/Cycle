<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="description" content="Cycle — Your budget. Your cycle." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cycle" />
    <link rel="apple-touch-icon" href="/Cycle/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/Cycle/icons/icon-192.png" />
    <title>Cycle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html, body, #root { height: 100%; width: 100%; overscroll-behavior: none; background-color: #0D0D0D; }
      body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      ::-webkit-scrollbar { width: 0; height: 0; }
      ::selection { background: rgba(255,209,102,0.25); }
    </style>
    <script>
      (function() {
        var route = sessionStorage.getItem('spa_route');
        if (route) {
          sessionStorage.removeItem('spa_route');
          var target = '/Cycle' + (route.startsWith('/') ? route : '/' + route);
          if (target !== window.location.pathname + window.location.search + window.location.hash) {
            history.replaceState(null, null, target);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
