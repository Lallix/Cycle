<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA redirect
      // Stores the path in sessionStorage then redirects to index.html
      var path = window.location.pathname;
      var query = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('spa_redirect', path + query + hash);
      window.location.replace('/Cycle/');
    </script>
  </head>
  <body></body>
</html>
